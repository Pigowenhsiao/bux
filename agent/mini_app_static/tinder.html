<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>agent</title>
    <link rel="stylesheet" href="/tinder.css?v=20260515x2" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <aside class="goal-rail" id="goalRail" aria-label="Goals">
        <div class="rail-actions">
          <button id="newGoalButton" class="new-goal" type="button">New Goal</button>
          <button id="collapseRailButton" class="collapse-rail" type="button" aria-label="Collapse goals">&lt;</button>
        </div>
        <div id="goalTabs" class="goal-tabs"></div>
      </aside>
      <section class="deck-shell">
        <header class="topbar">
          <div>
            <strong>agent</strong>
            <span id="deckMeta">0 cards</span>
          </div>
          <div class="top-actions">
            <button id="autopilotButton" class="autopilot-button" type="button">Autopilot</button>
            <button id="moreButton" type="button">More</button>
          </div>
        </header>
        <section class="mode-strip" aria-label="Agency mode">
          <span>Auto handles private work</span>
          <span>Approval before anything visible</span>
        </section>
        <section id="deck" class="deck" aria-live="polite"></section>
      </section>
      <dialog id="contextSheet" class="context-sheet">
        <form id="contextForm" method="dialog">
          <label for="contextInput">Tell me your goals so I know what to work on next.</label>
          <textarea id="contextInput" rows="5" placeholder="Tell the agent what changed or what to optimize for."></textarea>
          <div class="context-actions">
            <button id="voiceButton" type="button">Mic</button>
            <button value="cancel" type="button" data-close-context>Cancel</button>
            <button value="send" type="submit">Send</button>
          </div>
        </form>
      </dialog>
      <dialog id="goalSheet" class="context-sheet">
        <form id="goalForm" method="dialog">
          <label for="goalInput">New goal</label>
          <textarea id="goalInput" rows="5" placeholder="What should agent work on for you?"></textarea>
          <div class="goal-examples" aria-label="Examples">
            <button type="button" data-goal-example="Make my startup successful. Find distribution opportunities, draft posts, improve activation, and ask only before publishing.">Make my startup successful</button>
            <button type="button" data-goal-example="Reach 1000 users. Monitor launches, communities, signups, and outreach opportunities. Draft everything before asking me to send or post.">Reach 1000 users</button>
            <button type="button" data-goal-example="Plan an incredible trip. Research flights, hotels, schedules, and tradeoffs. Ask before booking or paying.">Plan an incredible trip</button>
          </div>
          <div class="context-actions">
            <button value="cancel" type="button" data-close-goal>Cancel</button>
            <button value="send" type="submit">Create</button>
          </div>
        </form>
      </dialog>
      <div id="toast" class="toast" role="status"></div>
    </main>
    <script src="/tinder.js?v=20260515x2" type="module"></script>
  </body>
</html>
