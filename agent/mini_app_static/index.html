<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Agency</title>
    <link rel="stylesheet" href="/app.css?v=20260512x40" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="phone">
      <header class="chrome">
        <button id="drawerButton" class="icon-button" type="button" aria-label="New topic">+</button>
        <div class="brand">
          <span>Agency</span>
          <strong id="activeGoal">Goal feed</strong>
        </div>
        <button id="statsButton" class="icon-button" type="button" aria-label="Stats">#</button>
      </header>

      <nav id="goalTabs" class="goal-tabs" aria-label="Goals"></nav>
      <section id="feed" class="feed" aria-live="polite"></section>

      <nav class="dock" aria-label="Current card actions" hidden>
        <button id="passButton" class="dock-button pass" type="button">
          <span>✕</span>
          <small>Pass</small>
        </button>
        <button id="voiceButton" class="dock-button voice" type="button">
          <span>●</span>
          <small>Speak</small>
        </button>
        <button id="startButton" class="dock-button start" type="button">
          <span>✓</span>
          <small>Start</small>
        </button>
      </nav>

      <aside id="drawer" class="drawer" aria-hidden="true">
        <div class="drawer-panel">
          <div class="drawer-head">
            <div>
              <span class="eyebrow">Goals</span>
              <h2>Your boxes</h2>
            </div>
            <button class="icon-button" data-close-drawer type="button" aria-label="Close">×</button>
          </div>
          <div id="goalList" class="goal-list"></div>
          <button id="newGoalButton" class="create-goal" type="button">New goal</button>
        </div>
      </aside>

      <dialog id="goalDialog" class="sheet">
        <form id="goalForm" method="dialog">
          <h2>Create topic</h2>
          <button id="goalRecordButton" class="record-button compact-record" type="button">
            <span>●</span>
            <strong>Speak goal</strong>
          </button>
          <textarea id="goalInput" rows="5" placeholder="What should this topic work on?"></textarea>
          <div class="goal-examples" aria-label="Goal examples">
            <span>Examples</span>
            <button type="button" data-goal-example="Monitor my Gmail every 30 minutes. Ignore spam and cold outreach. When something important arrives, draft three reply options in my style based on how I replied before.">Monitor Gmail and draft replies in my style</button>
            <button type="button" data-goal-example="Watch Slack and WhatsApp for important messages. Surface only what needs my attention, summarize the context, and draft short replies I can approve or edit.">Watch Slack and WhatsApp for important replies</button>
            <button type="button" data-goal-example="Monitor Datadog all day. Give me concise status updates, flag unusual metrics, and tell me what needs action versus what can wait.">Monitor Datadog and brief me on changes</button>
            <button type="button" data-goal-example="Own new signups. Enrich them from my CDP, explain why they matter, and draft a message I can accept, reject, or refine.">Enrich new signups and draft outreach</button>
            <button type="button" data-goal-example="Find moments in my communication channels where I can be grateful. Draft warm, specific messages to peers in my voice.">Find moments to thank people</button>
            <button type="button" data-goal-example="Watch Slack for great demos or use cases. Pitch me the best ones so we can turn them into a demo video or case study.">Turn great demos into case studies</button>
            <button type="button" data-goal-example="Make my startup successful. Help with distribution, remind me to stay healthy and fit, and suggest creative high-leverage things you can do for me.">Make my startup successful</button>
          </div>
          <button class="sheet-primary" type="submit">Create</button>
        </form>
      </dialog>

      <dialog id="contextDialog" class="sheet context-sheet">
        <form id="contextForm" method="dialog">
          <h2>Add context</h2>
          <button id="recordButton" class="record-button" type="button">
            <span>●</span>
            <strong>Speak</strong>
          </button>
          <textarea id="contextInput" rows="3" placeholder="What should the agent change or consider?"></textarea>
          <button class="sheet-primary" type="submit">Send</button>
        </form>
      </dialog>

      <dialog id="statsDialog" class="sheet">
        <div class="stats-sheet">
          <div class="drawer-head">
            <div>
              <span class="eyebrow">Stats</span>
              <h2>Momentum</h2>
            </div>
            <button class="icon-button" data-close-stats type="button" aria-label="Close">×</button>
          </div>
          <div id="statsGrid" class="stats-grid"></div>
        </div>
      </dialog>

      <div id="toast" class="toast" role="status"></div>
    </main>
    <script src="/app.js?v=20260512x40" type="module"></script>
  </body>
</html>
